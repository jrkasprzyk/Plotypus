name: Test and Publish

on:
  workflow_dispatch:
  pull_request:
  push:
    tags:
      - "v*"

jobs:
  # ------------------------------------------------------------
  # Run unit tests, linter, and other static checks.
  # ------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - name: Checkout source
        uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          allow-prereleases: true

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: |
          sudo apt update
          sudo DEBIAN_FRONTEND=noninteractive apt-get -y install libjpeg-dev zlib1g-dev
          poetry config virtualenvs.create false
          poetry install --with test

      - name: Run flake8
        run: flake8

      - name: Run tests
        run: pytest

  # ------------------------------------------------------------
  # Detect whether library or example code changed, so the (slow)
  # examples job can be skipped for docs- or CI-only changes.
  # ------------------------------------------------------------
  changes:
    runs-on: ubuntu-latest
    outputs:
      run-examples: ${{ steps.filter.outputs.code }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v7

      - name: Detect relevant changes
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            code:
              - 'plotypus/**'
              - 'examples/**'
              - 'pyproject.toml'
              - 'poetry.lock'
              - '.github/workflows/test-and-publish.yml'

  # ------------------------------------------------------------
  # Run all examples (targeting minimum Python version).
  # ------------------------------------------------------------
  examples:
    needs: changes
    if: needs.changes.outputs.run-examples == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v7

      - name: Get minimum Python version
        run: |
          PYTHON_VERSION=$(grep 'python = "' pyproject.toml | grep -Eo "[0-9]+\.[0-9]+" | head -1)
          echo "PYTHON_VERSION=${PYTHON_VERSION}" >> $GITHUB_ENV

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: |
          poetry config virtualenvs.create false
          poetry install --with test,docs

      - name: Run examples
        run: |
          find examples/ -name '*.py' -not -name '*mpi*' -not -name '*madlibs*' | \
            xargs -I {} sh -c "echo '{}:' && python '{}' && echo ''"

  # ------------------------------------------------------------
  # Build the distribution and publish (on release tag).
  # ------------------------------------------------------------
  publish:
    runs-on: ubuntu-latest
    needs: [test, examples]
    # Proceed when tests pass and examples did not fail; a skipped examples
    # job (docs/CI-only changes) must not block publish.
    if: ${{ !cancelled() && needs.test.result == 'success' && needs.examples.result != 'failure' }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v7

      - name: Get minimum Python version
        run: |
          PYTHON_VERSION=$(grep 'python = "' pyproject.toml | grep -Eo "[0-9]+\.[0-9]+" | head -1)
          echo "PYTHON_VERSION=${PYTHON_VERSION}" >> $GITHUB_ENV

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install Poetry
        run: pip install poetry

      - name: Validate links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          file-path: README.md
          config-file: .github/workflows/markdown-link-check-config.json

      - name: Build distributions
        run: poetry build

      - name: Publish package
        if: github.repository == 'jrkasprzyk/Plotypus' && github.event_name == 'push' && startsWith(github.ref, 'refs/tags')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
